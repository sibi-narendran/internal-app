services:
  postgres:
    image: postgres:16-alpine
    container_name: internal-app-postgres
    environment:
      POSTGRES_DB: internal_app
      POSTGRES_USER: internal_app
      POSTGRES_PASSWORD: internal_app_password
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
